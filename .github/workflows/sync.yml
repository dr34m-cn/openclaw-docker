name: Sync to Docker Hub

on:
  repository_dispatch:
    types: [sync-openclaw]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Sync Specific Tags and Generate Summary
        run: |
          SOURCE="ghcr.io/openclaw/openclaw"
          TARGET="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/openclaw"
          
          TAGS=("latest" "slim" "main" "main-slim" "main-amd64" "main-arm64" "main-slim-amd64" "main-slim-arm64")
          
          SUMMARY_FILE="sync_summary.md"
          
          echo "## 🐳 Docker Image Sync Summary" > $SUMMARY_FILE
          echo "" >> $SUMMARY_FILE
          echo "| Tag | Status | Sync Time (UTC) | Digest |" >> $SUMMARY_FILE
          echo "|---|---|---|---|" >> $SUMMARY_FILE
          
          echo "🚀 Starting sync for tags: ${TAGS[*]}"
          
          for TAG in "${TAGS[@]}"; do
            echo "----------------------------------------"
            echo "🔍 Checking tag: $TAG"
            
            SYNC_TIME=$(date -u "+%Y-%m-%d %H:%M:%S")
            NEEDS_SYNC=false
            
            SRC_DIGEST=$(skopeo inspect --format '{{.Digest}}' "docker://$SOURCE:$TAG" 2>src_error.log || echo "missing_in_source")
            
            if [ "$SRC_DIGEST" == "missing_in_source" ]; then
              echo "⚠️ Warning: Tag '$TAG' not found in source ($SOURCE). Skipping."
              cat src_error.log
              echo "| \`$TAG\` | ⚠️ Source Missing | $SYNC_TIME | N/A |" >> $SUMMARY_FILE
              continue
            fi
            
            README_DIGEST=$(grep "| \`$TAG\` |" README.md 2>/dev/null | grep -o 'sha256:[a-f0-9]\{64\}' | head -n 1 || echo "not_found_in_readme")
            
            echo "   Source Digest: $SRC_DIGEST"
            echo "   README Digest: ${README_DIGEST:-None}"
            
            FORMATTED_SRC="<details><summary>\`${SRC_DIGEST:0:13}...${SRC_DIGEST:65:71}\`</summary>\`$SRC_DIGEST\`</details>"
            
            if [ "$SRC_DIGEST" == "$README_DIGEST" ]; then
              echo "✅ Source matches README cache. No update needed for '$TAG'."
              echo "| \`$TAG\` | ⏭️ Skipped (Identical digest) | $SYNC_TIME | $FORMATTED_SRC |" >> $SUMMARY_FILE
              continue
              
            elif [ "$README_DIGEST" != "not_found_in_readme" ]; then
              
              echo "🔄 Image updated (Cache mismatch)."
              NEEDS_SYNC=true
              
            else
              
              echo "🔍 Tag not found in README cache. Inspecting target on Docker Hub..."
              TGT_DIGEST=$(skopeo inspect --format '{{.Digest}}' "docker://$TARGET:$TAG" 2>tgt_error.log || echo "missing_in_target")
              
              DISPLAY_TGT=$TGT_DIGEST
              if [ "$TGT_DIGEST" == "missing_in_target" ]; then
                DISPLAY_TGT="None"
                echo "🚨 [DEBUG] Target inspect failed for '$TAG'. Real error was:"
                cat tgt_error.log
                NEEDS_SYNC=true
              else
                echo "   Target Digest: $DISPLAY_TGT"
                if [ "$SRC_DIGEST" == "$TGT_DIGEST" ]; then
                  echo "✅ Target matches Source. No update needed for '$TAG'."
                  echo "| \`$TAG\` | ⏭️ Skipped (Already exists) | $SYNC_TIME | $FORMATTED_SRC |" >> $SUMMARY_FILE
                else
                  echo "🔄 Target mismatch. Sync required."
                  NEEDS_SYNC=true
                fi
              fi
            fi
            
            if [ "$NEEDS_SYNC" == true ]; then
              echo "🚀 Syncing '$TAG' to Docker Hub..."
              skopeo copy --all "docker://$SOURCE:$TAG" "docker://$TARGET:$TAG"
              echo "✅ Finished syncing: '$TAG'"
              
              echo "| \`$TAG\` | ✅ Synced | $SYNC_TIME | $FORMATTED_SRC |" >> $SUMMARY_FILE
            fi
            
          done
          
          UTC_TIME=$(date -u +"%Y-%m-%d %H:%M:%S")
          BJT_TIME=$(TZ='Asia/Shanghai' date +"%Y-%m-%d %H:%M:%S")
          echo "" >> $SUMMARY_FILE
          echo "Last synced(UTC): $UTC_TIME" >> $SUMMARY_FILE
          echo "" >> $SUMMARY_FILE
          echo "最后同步(北京时间): $BJT_TIME" >> $SUMMARY_FILE
          
          cat $SUMMARY_FILE >> $GITHUB_STEP_SUMMARY
          
          awk -v r="$(cat $SUMMARY_FILE)" '/<!-- placeholder-start -->/{print;print "";print r;print "";f=1;next} /<!-- placeholder-end -->/{f=0} !f' README.md > README.tmp && mv README.tmp README.md
          
          echo "----------------------------------------"
          echo "🎉 Sync workflow completed successfully!"

      - name: Commit and Push README
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          
          if ! git diff --staged --quiet; then
            git commit -m "Synced at ------------>--->--->--->--->--->--->--->--->--->"
            git push
            echo "✅ README updated and pushed successfully."
          else
            echo "⏭️ No changes in README to commit."
          fi
      
      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/openclaw
          readme-filepath: ./README.md