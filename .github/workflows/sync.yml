name: Sync Specific Tags to Docker Hub

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Sync Specific Tags via Skopeo
        run: |
          SOURCE="ghcr.io/openclaw/openclaw"
          TARGET="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/openclaw"
          
          TAGS=("main" "main-slim" "latest")
          
          echo "🚀 Starting to sync specific tags: ${TAGS[*]}"
          
          for TAG in "${TAGS[@]}"; do
            echo "----------------------------------------"
            echo "🔄 Syncing tag: $TAG"
            
            skopeo copy --all "docker://$SOURCE:$TAG" "docker://$TARGET:$TAG" || echo "⚠️ Warning: Failed to sync $TAG (Maybe it does not exist on source yet)."
            
            echo "✅ Finished syncing: $TAG"
          done
          
          echo "----------------------------------------"
          echo "🎉 All specified tags synchronized successfully!"