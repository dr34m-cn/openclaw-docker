name: Sync to Docker Hub

on:
  repository_dispatch:
    types: [sync-openclaw]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Sync Specific Tags and Generate Summary
        run: |
          SOURCE="ghcr.io/openclaw/openclaw"
          TARGET="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/openclaw"
          
          TAGS=("main-amd64" "main-arm64" "main" "main-slim-amd64" "main-slim-arm64" "main-slim" "latest")
          
          SUMMARY_FILE="sync_summary.md"
          
          echo "## 🐳 Docker Image Sync Summary" > $SUMMARY_FILE
          echo "" >> $SUMMARY_FILE
          echo "| Tag | Status | Sync Time (UTC) | Source Digest | Target Digest |" >> $SUMMARY_FILE
          echo "|---|---|---|---|---|" >> $SUMMARY_FILE
          
          echo "🚀 Starting sync for tags: ${TAGS[*]}"
          
          for TAG in "${TAGS[@]}"; do
            echo "----------------------------------------"
            echo "🔍 Checking tag: $TAG"
            
            SYNC_TIME=$(date -u "+%Y-%m-%d %H:%M:%S")
            
            SRC_DIGEST=$(skopeo inspect --format '{{.Digest}}' "docker://$SOURCE:$TAG" 2>/dev/null || echo "missing_in_source")
            
            if [ "$SRC_DIGEST" == "missing_in_source" ]; then
              echo "⚠️ Warning: Tag '$TAG' not found in source ($SOURCE). Skipping."
              echo "| \`$TAG\` | ⚠️ Source Missing | $SYNC_TIME | N/A | N/A |" >> $SUMMARY_FILE
              continue
            fi
            
            TGT_DIGEST=$(skopeo inspect --format '{{.Digest}}' "docker://$TARGET:$TAG" 2>/dev/null || echo "missing_in_target")
            
            DISPLAY_TGT=$TGT_DIGEST
            if [ "$TGT_DIGEST" == "missing_in_target" ]; then
              DISPLAY_TGT="None"
            fi
            
            echo "   Source Digest: $SRC_DIGEST"
            echo "   Target Digest: $DISPLAY_TGT"
            
            FORMATTED_SRC="<details><summary>\`${SRC_DIGEST:0:10}...\`</summary>\`$SRC_DIGEST\`</details>"
            
            if [ "$DISPLAY_TGT" == "None" ]; then
              FORMATTED_TGT="None"
            else
              FORMATTED_TGT="<details><summary>\`${DISPLAY_TGT:0:10}...\`</summary>\`$DISPLAY_TGT\`</details>"
            fi
            # -------------------------------------------------------------------

            if [ "$SRC_DIGEST" == "$TGT_DIGEST" ]; then
              echo "✅ Digests match perfectly. No update needed for '$TAG'. Skipping sync."
              echo "| \`$TAG\` | ⏭️ Skipped (Match) | $SYNC_TIME | $FORMATTED_SRC | $FORMATTED_TGT |" >> $SUMMARY_FILE
            else
              echo "🔄 Digests differ or target is missing. Syncing '$TAG'..."
              skopeo copy --all "docker://$SOURCE:$TAG" "docker://$TARGET:$TAG"
              echo "✅ Finished syncing: '$TAG'"
              
              FORMATTED_TGT_AFTER="<details><summary>\`${SRC_DIGEST:0:10}...\`</summary>\`$SRC_DIGEST\`</details>"
              
              echo "| \`$TAG\` | ✅ Synced | $SYNC_TIME | $FORMATTED_SRC | $FORMATTED_TGT_AFTER |" >> $SUMMARY_FILE
            fi
          done
          
          UTC_TIME=$(date -u +"%Y-%m-%d %H:%M:%S")
          BJT_TIME=$(TZ='Asia/Shanghai' date +"%Y-%m-%d %H:%M:%S")
          echo "" >> $SUMMARY_FILE
          echo "Last synced(UTC): $UTC_TIME" >> $SUMMARY_FILE
          echo "" >> $SUMMARY_FILE
          echo "最后同步(北京时间): $BJT_TIME" >> $SUMMARY_FILE

          
          cat $SUMMARY_FILE >> $GITHUB_STEP_SUMMARY
          
          awk -v r="$(cat $SUMMARY_FILE)" '/<!-- placeholder-start -->/{print;print "";print r;print "";f=1;next} /<!-- placeholder-end -->/{f=0} !f' README.md > README.tmp && mv README.tmp README.md
          
          echo "----------------------------------------"
          echo "🎉 Sync workflow completed successfully!"

      - name: Commit and Push README
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          
          if ! git diff --staged --quiet; then
            git commit -m "Synced at --->--->--->--->--->--->--->--->--->--->--->--->--->"
            git push
            echo "✅ README updated and pushed successfully."
          else
            echo "⏭️ No changes in README to commit."
          fi