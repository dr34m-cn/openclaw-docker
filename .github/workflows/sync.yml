name: Sync Image to Docker Hub

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Sync Image via Skopeo
        run: |
          SOURCE_IMAGE="docker://ghcr.io/openclaw/openclaw:latest"
          TARGET_IMAGE="docker://docker.io/${{ secrets.DOCKERHUB_USERNAME }}/openclaw:latest"
          echo "Starting sync from $SOURCE_IMAGE to $TARGET_IMAGE"
          skopeo copy --all "$SOURCE_IMAGE" "$TARGET_IMAGE"
          echo "Sync completed successfully!"