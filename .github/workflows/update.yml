name: Update README Sync Time

on:
  repository_dispatch:
    types: [sync-openclaw]
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update time in README
        run: |
          UTC_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          BJT_TIME=$(TZ='Asia/Shanghai' date +"%Y-%m-%d %H:%M:%S")

          # 1. 截取从第一行到 start 标签的所有内容，写入临时文件
          sed -n '1,//p' README.md > temp.md
          
          # 2. 写入你要的格式：一个空行 + 两个时间 + 一个空行
          echo "" >> temp.md
          echo "Last synced: $UTC_TIME" >> temp.md
          echo "最后同步于：$BJT_TIME" >> temp.md
          echo "" >> temp.md
          
          # 3. 截取从 end 标签到最后一行的所有内容，追加到临时文件
          sed -n '//,$p' README.md >> temp.md
          
          # 4. 覆盖原文件
          mv temp.md README.md

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add README.md
          
          if ! git diff --staged --quiet; then
            git commit -m "docs: update sync time"
            git push
          else
            echo "✨ README.md 内容无变化，无需提交。"
          fi