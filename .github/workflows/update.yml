name: Update README Sync Time

on:
  repository_dispatch:
    types: [sync-openclaw]
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update time in README
        run: |
          UTC_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          BJT_TIME=$(TZ='Asia/Shanghai' date +"%Y-%m-%d %H:%M:%S")

          awk -v utc="Last synced: $UTC_TIME" -v bjt="最后同步于：$BJT_TIME" '
          // {
              print
              print utc
              print ""
              print bjt
              skip=1
              next
          }
          // {
              skip=0
          }
          !skip {print}
          ' README.md > temp.md && mv temp.md README.md

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add README.md
          
          if ! git diff --staged --quiet; then
            git commit -m "docs: update sync time"
            git push
          else
            echo "✨ README.md 内容无变化，无需提交。"
          fi