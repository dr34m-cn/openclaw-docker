name: Update README Sync Time

on:
  workflow_run:
    workflows: ["Sync to Docker Hub"]
    types:
      - completed

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update time in README
        run: |
          UTC_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          BJT_TIME=$(TZ='Asia/Shanghai' date +"%Y-%m-%d %H:%M:%S +08:00")
          
          START_LINE=$(grep -n "<!-- placeholder-start -->" README.md | head -n 1 | cut -d: -f1)
          END_LINE=$(grep -n "<!-- placeholder-end -->" README.md | head -n 1 | cut -d: -f1)
          
          if [ -z "$START_LINE" ] || [ -z "$END_LINE" ]; then
            echo "❌ 找不到占位符，请检查 README.md"
            exit 1
          fi
          
          head -n "$START_LINE" README.md > temp.md
          
          echo "" >> temp.md
          echo "Last synced: $UTC_TIME" >> temp.md
          echo "" >> temp.md
          echo "最后同步于：$BJT_TIME" >> temp.md
          echo "" >> temp.md
          
          # 截取从 END_LINE 到文件末尾的所有内容并追加
          tail -n +"$END_LINE" README.md >> temp.md
          
          mv temp.md README.md
          echo "✅ README 更新成功！"

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add README.md
          
          if ! git diff --staged --quiet; then
            git commit -m "Synced at --->--->--->--->--->--->--->--->--->--->--->--->--->"
            git push
          else
            echo "✨ README.md 内容无变化，无需提交。"
          fi